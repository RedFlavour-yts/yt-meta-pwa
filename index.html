<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="YT Meta"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>YT Meta 생성기</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#ffffff;--bg2:#f6f6f4;--bg3:#efefec;
    --text:#1a1a1a;--text2:#666;--text3:#999;
    --border:#e0e0da;--border2:#ccc;
    --accent:#1a1a1a;--green:#1a7a4a;--green-bg:#eaf6ef;
    --radius:12px;--radius-sm:8px;
    --font:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo',sans-serif;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
      --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
      --border:#3a3a3c;--border2:#48484a;
      --accent:#f2f2f7;--green:#34c759;--green-bg:#1a3326;
    }
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;}
  body{display:flex;flex-direction:column;max-width:600px;margin:0 auto;}

  /* Header */
  header{
    padding:16px 20px 12px;
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;background:var(--bg);z-index:10;
  }
  header h1{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
  .settings-btn{
    width:34px;height:34px;border-radius:50%;
    border:1px solid var(--border);background:var(--bg2);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:16px;
  }

  /* Main scroll area */
  main{flex:1;overflow-y:auto;padding:20px;}

  /* API key panel */
  .api-panel{
    background:var(--bg2);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:20px;
    border:1px solid var(--border);
  }
  .api-panel label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500;}
  .api-row{display:flex;gap:8px;}
  .api-input{
    flex:1;padding:9px 12px;border-radius:var(--radius-sm);
    border:1px solid var(--border2);background:var(--bg);
    color:var(--text);font-size:14px;font-family:var(--font);
    outline:none;
  }
  .api-input:focus{border-color:var(--accent);}
  .save-btn{
    padding:9px 16px;border-radius:var(--radius-sm);
    border:1px solid var(--border2);background:var(--accent);
    color:var(--bg);font-size:14px;font-weight:500;cursor:pointer;
    white-space:nowrap;
  }
  .api-status{font-size:11px;margin-top:6px;color:var(--text3);}
  .api-status.ok{color:var(--green);}

  /* Input area */
  .input-section label{font-size:12px;color:var(--text2);font-weight:500;letter-spacing:0.03em;display:block;margin-bottom:8px;}
  .title-input{
    width:100%;padding:13px 16px;
    border-radius:var(--radius);border:1px solid var(--border2);
    background:var(--bg);color:var(--text);
    font-size:16px;font-family:var(--font);outline:none;
    transition:border-color 0.15s;
  }
  .title-input:focus{border-color:var(--accent);}
  .gen-btn{
    width:100%;margin-top:12px;padding:14px;
    border-radius:var(--radius);border:none;
    background:var(--accent);color:var(--bg);
    font-size:16px;font-weight:600;font-family:var(--font);
    cursor:pointer;transition:opacity 0.15s;
    letter-spacing:-0.2px;
  }
  .gen-btn:active{opacity:0.7;}
  .gen-btn:disabled{opacity:0.35;cursor:not-allowed;}

  /* Skeleton */
  .skeleton-wrap{margin-top:24px;display:none;}
  .skeleton{background:var(--bg3);border-radius:var(--radius);animation:pulse 1.3s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* Result cards */
  .result-wrap{margin-top:24px;display:none;gap:16px;flex-direction:column;}
  .result-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
  .card-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;border-bottom:1px solid var(--border);
  }
  .card-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;}
  .copy-btn{
    font-size:12px;font-weight:500;padding:5px 12px;
    border-radius:20px;border:1px solid var(--border2);
    background:var(--bg);color:var(--text2);cursor:pointer;
    transition:all 0.15s;font-family:var(--font);
  }
  .copy-btn.copied{color:var(--green);border-color:var(--green);background:var(--green-bg);}
  .card-body{padding:14px 16px;font-size:14px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word;}
  .tags-body{padding:12px 16px;display:flex;flex-wrap:wrap;gap:6px;}
  .tag{
    font-size:12px;padding:4px 10px;border-radius:20px;
    background:var(--bg3);color:var(--text2);
    border:1px solid var(--border);
  }

  /* Error */
  .error-msg{
    margin-top:16px;padding:12px 16px;
    background:#fff0f0;border:1px solid #fcc;
    border-radius:var(--radius-sm);font-size:13px;color:#c00;
    display:none;
  }

  /* Safe area bottom */
  .bottom-pad{height:env(safe-area-inset-bottom,16px);}
</style>
</head>
<body>

<header>
  <h1>📋 YT Meta 생성기</h1>
  <div class="settings-btn" onclick="toggleApiPanel()" title="API 키 설정">⚙️</div>
</header>

<main>
  <!-- API Key Panel -->
  <div class="api-panel" id="apiPanel" style="display:none">
    <label>Anthropic API Key</label>
    <div class="api-row">
      <input class="api-input" id="apiKeyInput" type="password" placeholder="sk-ant-api03-..."/>
      <button class="save-btn" onclick="saveKey()">저장</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <!-- Title Input -->
  <div class="input-section">
    <label>영상 제목</label>
    <input class="title-input" id="titleInput" type="text"
      placeholder="예: 배신당한 사람들이 공통적으로 놓치는 것"
      autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="gen-btn" id="genBtn" onclick="generate()">설명 + 태그 생성</button>
  </div>

  <!-- Skeleton -->
  <div class="skeleton-wrap" id="skeleton">
    <div class="skeleton" style="height:160px;margin-bottom:12px;"></div>
    <div class="skeleton" style="height:80px;"></div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Results -->
  <div class="result-wrap" id="results">
    <div class="result-card">
      <div class="card-header">
        <span class="card-label">설명</span>
        <button class="copy-btn" id="copyDescBtn" onclick="copyText('desc')">복사</button>
      </div>
      <div class="card-body" id="descText"></div>
    </div>
    <div class="result-card">
      <div class="card-header">
        <span class="card-label">태그</span>
        <button class="copy-btn" id="copyTagsBtn" onclick="copyText('tags')">복사</button>
      </div>
      <div class="tags-body" id="tagsBody"></div>
    </div>
  </div>

  <div class="bottom-pad"></div>
</main>

<script>
const AI_DISCLOSURE = '\n\n---\n※ 이 영상은 AI 기술을 활용하여 제작되었습니다.';
let descRaw = '', tagsRaw = '';

// API Key management
function getKey(){ return localStorage.getItem('yt_api_key') || ''; }
function saveKey(){
  const k = document.getElementById('apiKeyInput').value.trim();
  if(!k){ showApiStatus('API 키를 입력해주세요.', false); return; }
  localStorage.setItem('yt_api_key', k);
  showApiStatus('저장되었습니다.', true);
}
function showApiStatus(msg, ok){
  const el = document.getElementById('apiStatus');
  el.textContent = msg;
  el.className = 'api-status' + (ok ? ' ok' : '');
}
function toggleApiPanel(){
  const p = document.getElementById('apiPanel');
  const visible = p.style.display !== 'none';
  p.style.display = visible ? 'none' : 'block';
  if(!visible){
    const k = getKey();
    document.getElementById('apiKeyInput').value = k;
    showApiStatus(k ? '저장된 키가 있습니다.' : 'API 키를 입력하고 저장하세요.', !!k);
  }
}

// On load: show api panel if no key
window.addEventListener('load', () => {
  if(!getKey()) {
    document.getElementById('apiPanel').style.display = 'block';
    showApiStatus('API 키를 입력하고 저장하세요.', false);
  }
  document.getElementById('titleInput').addEventListener('keydown', e => {
    if(e.key === 'Enter') generate();
  });
});

async function generate(){
  const title = document.getElementById('titleInput').value.trim();
  if(!title) return;
  const key = getKey();
  if(!key){
    document.getElementById('apiPanel').style.display = 'block';
    showApiStatus('API 키를 먼저 저장해주세요.', false);
    return;
  }

  setLoading(true);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`당신은 한국어 심리 콘텐츠 유튜브 채널의 SEO 전문가입니다.
영상 제목을 받으면 아래 JSON 형식으로만 응답하세요. 다른 말은 절대 하지 마세요.

{
  "description": "유튜브 영상 설명문 (150~250자, 자연스럽고 궁금증을 유발하는 문체, 심리학 관련 채널 톤)",
  "tags": ["태그1","태그2",...] // 관련 키워드 10~15개, 해시태그 없이 단어만
}

설명문은 자연스러운 문단으로 작성하고 해시태그를 포함하지 마세요.
태그는 검색 노출에 최적화된 핵심 키워드로 구성하세요.`,
        messages:[{role:'user', content:`영상 제목: ${title}`}]
      })
    });

    if(!res.ok){
      const err = await res.json();
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const text = data.content?.map(i => i.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    descRaw = parsed.description + AI_DISCLOSURE;
    tagsRaw = Array.isArray(parsed.tags) ? parsed.tags.join(', ') : parsed.tags;

    document.getElementById('descText').textContent = descRaw;

    const tagsBody = document.getElementById('tagsBody');
    tagsBody.innerHTML = '';
    (parsed.tags||[]).forEach(t => {
      const span = document.createElement('span');
      span.className = 'tag';
      span.textContent = t;
      tagsBody.appendChild(span);
    });

    setLoading(false);
    document.getElementById('results').style.display = 'flex';
    document.getElementById('errorMsg').style.display = 'none';

  } catch(e) {
    setLoading(false);
    const em = document.getElementById('errorMsg');
    em.textContent = '오류: ' + e.message;
    em.style.display = 'block';
  }
}

function setLoading(on){
  document.getElementById('genBtn').disabled = on;
  document.getElementById('genBtn').textContent = on ? '생성 중...' : '설명 + 태그 생성';
  document.getElementById('skeleton').style.display = on ? 'block' : 'none';
  if(on) document.getElementById('results').style.display = 'none';
}

function copyText(type){
  const text = type==='desc' ? descRaw : tagsRaw;
  const btnId = type==='desc' ? 'copyDescBtn' : 'copyTagsBtn';
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById(btnId);
    btn.textContent = '복사됨 ✓';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='복사'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}
</script>
</body>
</html>
